name: Deploy

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Read site config
        id: site
        run: |
          echo "host=$(node -p "require('./config/site.json').host")" >> "$GITHUB_OUTPUT"
          echo "cms=$(node -p "require('./config/site.json').cmsEndpoint")" >> "$GITHUB_OUTPUT"
          echo "pages=$(node -p "require('./config/site.json').pagesProject")" >> "$GITHUB_OUTPUT"
          echo "origin=$(node -p "require('./config/site.json').origin")" >> "$GITHUB_OUTPUT"
          echo "branch=$(node -p "require('./config/site.json').productionBranch")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build

      - name: Deploy demo to Cloudflare Pages
        id: pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist/demo
            --project-name=${{ steps.site.outputs.pages }}
            --branch=${{ github.event_name == 'pull_request' && github.head_ref || steps.site.outputs.branch }}

      - name: Attach custom domain to Pages (production)
        if: github.ref == format('refs/heads/{0}', steps.site.outputs.branch)
        continue-on-error: true
        run: node scripts/attach-pages-domain.mjs

      - name: Deploy mock CMS Worker (production)
        if: github.ref == format('refs/heads/{0}', steps.site.outputs.branch)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config worker/wrangler.toml --env production

      - name: Attach CMS Worker custom domain (production)
        if: github.ref == format('refs/heads/{0}', steps.site.outputs.branch)
        continue-on-error: true
        run: node scripts/attach-worker-domain.mjs

      - name: Post-deploy smoke (production)
        if: github.ref == format('refs/heads/{0}', steps.site.outputs.branch)
        run: |
          set -euo pipefail
          ORIGIN="${{ steps.site.outputs.origin }}"
          CMS="${{ steps.site.outputs.cms }}"
          echo "Validating CMS JSON at ${CMS}"
          node scripts/validate-cms-json.mjs "${CMS}"
          echo "Canary verify ${ORIGIN}"
          npm run canary:verify -- "${ORIGIN}" || npm run canary:verify -- "https://feature-cards.pages.dev"

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const preview = '${{ steps.pages.outputs.deployment-url }}';
            const production = '${{ steps.site.outputs.origin }}';
            const body = preview
              ? `**Preview:** ${preview}\n\n**Production (on merge to \`${{ steps.site.outputs.branch }}\`):** ${production}`
              : `**Production (on merge to \`${{ steps.site.outputs.branch }}\`):** ${production}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
