name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Size budget
        run: npm run size

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Accessibility tests (axe)
        run: npm run test:a11y

      - name: End-to-end tests
        run: npm run test:e2e

      # Visual baselines are generated on Windows; rendering differs per
      # platform, so CI checks layout via e2e and skips pixel comparison.
      - name: Visual tests (layout only on Linux)
        run: npx playwright test tests/visual --ignore-snapshots

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
