name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Agent rules mirror check
        run: npm run rules:sync:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests + coverage
        run: npm run coverage

      - name: MSW contract tests
        run: npm run test:contracts

      - name: Property-based schema fuzz
        run: npm run test:fuzz

      - name: CEM manifest drift check
        run: npm run cem:check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Size budget
        run: npm run size

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Accessibility tests (axe)
        run: npm run test:a11y

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Visual tests (layout only on Linux)
        run: npx playwright test tests/visual --ignore-snapshots

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  webkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps webkit
      - run: npm run test:e2e -- --project=webkit

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:bench
