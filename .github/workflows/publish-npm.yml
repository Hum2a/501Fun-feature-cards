# Publish @techystuff/feature-cards to npm with provenance so the package links
# back to this GitHub repository (sidebar "Packages" + npm provenance badge).
#
# One-time npm setup (recommended — no long-lived NPM_TOKEN):
#   https://www.npmjs.com/package/@techystuff/feature-cards/access
#   → Trusted publishing → GitHub Actions
#   → Owner: Hum2a · Repository: feature-cards · Workflow: publish-npm.yml
#
# Fallback: set GitHub secret NPM_TOKEN (granular publish token) if trusted
# publishing is not configured yet.

name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v1.1.0) — HEAD must match tag'
        required: true
        type: string

concurrency:
  group: publish-npm-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Stable tags only — pre-releases (v1.0.0-beta) are not auto-published
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && !contains(github.event.inputs.tag, '-'))
        || (github.event_name == 'push' && !contains(github.ref_name, '-'))
      }}
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing + provenance (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node ≥ 22.14 and npm ≥ 11.5.1
          node-version: '22.14'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package.json
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $VERSION"
            exit 1
          fi
          echo "Publishing ${TAG} (package.json ${VERSION})"

      - name: Verify repository field links to this repo
        run: |
          REPO=$(node -p "require('./package.json').repository.url")
          EXPECT="git+https://github.com/${{ github.repository }}.git"
          if [ "$REPO" != "$EXPECT" ]; then
            echo "package.json repository.url must be $EXPECT (got $REPO)"
            echo "GitHub uses this field to link the npm package to the repository sidebar."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build, test, and publish with provenance
        run: npm run release:package
        env:
          # Omit when using npm trusted publishing (OIDC). npm tries OIDC before tokens.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
