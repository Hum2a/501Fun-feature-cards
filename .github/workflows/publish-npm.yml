# Publish @techystuff/feature-cards to npm (registry.npmjs.org) and mirror to
# GitHub Packages so the repo sidebar "Packages" section is populated.
#
# npm (consumers): @techystuff/feature-cards — requires trusted publishing OR NPM_TOKEN
# GitHub Packages (sidebar): @hum2a/feature-cards — uses GITHUB_TOKEN automatically
#
# npm one-time setup:
#   https://www.npmjs.com/package/@techystuff/feature-cards/access
#   → Trusted publishing → GitHub Actions → workflow: publish-npm.yml

name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v1.1.1) — HEAD must match tag'
        required: true
        type: string

concurrency:
  group: publish-npm-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && !contains(github.event.inputs.tag, '-'))
        || (github.event_name == 'push' && !contains(github.ref_name, '-'))
      }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package.json
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $VERSION"
            exit 1
          fi
          echo "Publishing ${TAG} (package.json ${VERSION})"

      - name: Verify repository field links to this repo
        run: |
          REPO=$(node -p "require('./package.json').repository.url")
          EXPECT="git+https://github.com/${{ github.repository }}.git"
          if [ "$REPO" != "$EXPECT" ]; then
            echo "package.json repository.url must be $EXPECT (got $REPO)"
            exit 1
          fi

      - name: Auth hint
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "Using NPM_TOKEN secret for npm publish."
          else
            echo "NPM_TOKEN not set — using npm trusted publishing (OIDC)."
            echo "Configure at: https://www.npmjs.com/package/@techystuff/feature-cards/access"
            echo "  Owner: Hum2a · Repo: feature-cards · Workflow: publish-npm.yml"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Preflight build and size gate
        run: |
          npm run pack:verify
          npm run typecheck
          npm run lint
          npm run size

      - name: Publish to npm with provenance
        run: node scripts/publish-package.mjs --skip-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    name: Publish to GitHub Packages (repo sidebar)
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && !contains(github.event.inputs.tag, '-'))
        || (github.event_name == 'push' && !contains(github.ref_name, '-'))
      }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: https://npm.pkg.github.com
          scope: '@hum2a'
          package-manager-cache: false

      - name: Verify tag matches package.json
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION=$(node -p "require('./package.json').version")
          if [ "v${VERSION}" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        run: node scripts/publish-github-package.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
