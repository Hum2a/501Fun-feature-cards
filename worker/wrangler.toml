# Mock CMS Worker for the <feature-cards> demo.
# © 2026 Humza Butt — AGPL-3.0-only
#
# Production host: config/site.json → 501fun.humza-butt.space
# Worker handles /api/* on that host; Pages serves everything else.

name = "feature-cards-cms"
main = "index.ts"
compatibility_date = "2026-06-01"

[dev]
port = 8787

[vars]
CORS_ORIGIN = "*"

[env.preview]
name = "feature-cards-cms-preview"
[env.preview.vars]
CORS_ORIGIN = "*"

[env.production]
name = "feature-cards-cms"

[env.production.vars]
CORS_ORIGIN = "https://501fun.humza-butt.space"

[[env.production.routes]]
pattern = "501fun.humza-butt.space/api/*"
zone_name = "humza-butt.space"
