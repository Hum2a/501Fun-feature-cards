# Mock CMS Worker for the <feature-cards> demo.
# © 2026 Humza Butt — AGPL-3.0-only
#
# Production: config/site.json → cms.501fun.humza-butt.space (mock CMS)
# Pages serves the demo at 501fun.humza-butt.space; CMS is on a Worker custom domain.

name = "feature-cards-cms"
main = "index.ts"
compatibility_date = "2026-06-01"

[dev]
port = 8787

[vars]
CORS_ORIGIN = "*"

[env.preview]
name = "feature-cards-cms-preview"
[env.preview.vars]
CORS_ORIGIN = "*"

[env.production]
name = "feature-cards-cms"

[env.production.vars]
CORS_ORIGIN = "https://501fun.humza-butt.space"

# Custom domain is attached after deploy via scripts/attach-worker-domain.mjs
# (Wrangler route binding needs Zone → Workers Routes → Edit on the token).
